<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Check In</title>
  <!-- Phone body -->
  <rect x="10" y="3" width="16" height="26" rx="3" fill="#455a7c"/>
  <rect x="12" y="6" width="12" height="17" rx="1" fill="white"/>
  <!-- Home button dot -->
  <circle cx="18" cy="26" r="1.5" fill="white" opacity="0.5"/>
  <!-- Scan lines radiating right -->
  <line x1="27" y1="11" x2="32" y2="8" stroke="#455a7c" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="14.5" x2="33" y2="14.5" stroke="#455a7c" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="18" x2="32" y2="21" stroke="#455a7c" stroke-width="2" stroke-linecap="round"/>
  <!-- QR pattern on screen -->
  <rect x="13.5" y="7.5" width="4" height="4" rx="0.5" fill="#455a7c"/>
  <rect x="14.5" y="8.5" width="2" height="2" rx="0.3" fill="white"/>
  <rect x="18.5" y="7.5" width="4" height="4" rx="0.5" fill="#455a7c"/>
  <rect x="19.5" y="8.5" width="2" height="2" rx="0.3" fill="white"/>
  <rect x="13.5" y="13.5" width="4" height="4" rx="0.5" fill="#455a7c"/>
  <rect x="14.5" y="14.5" width="2" height="2" rx="0.3" fill="white"/>
  <rect x="18.5" y="13.5" width="2" height="2" rx="0.5" fill="#455a7c"/>
  <rect x="21" y="13.5" width="1.5" height="2" rx="0.3" fill="#455a7c"/>
  <rect x="18.5" y="16" width="3" height="1.5" rx="0.3" fill="#455a7c"/>
</svg>
